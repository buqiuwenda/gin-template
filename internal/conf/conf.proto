syntax = "proto3";
package gin.api;

option go_package = "github.com/buqiuwenda/gin-template/internal/conf;conf";

import "google/protobuf/duration.proto";

message Bootstrap {
  Server server = 1;
  Data data = 2;
}

message Server {
  message HTTP {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration timeout = 3;
    string mode = 4;
  }
  message GRPC {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration timeout = 3;
    string mode = 4;
  }
  HTTP http = 1;
  GRPC grpc = 2;
}

message Data {
  map<string, MysqlDBConfig> mysql = 1;
  map<string,RedisDBConfig> redis =2;
  JwtConfig jwt = 3;
}


message MysqlDBConfig {
  message Master {
    string dsn = 1;
  }
  message Slave {
    string dsn = 1;
  }
  Master master = 1;
  repeated Slave slaves = 2;
  int64 max_idle = 3;
  int64 max_open = 4;
  int64 max_lifetime = 5;
  bool is_debug = 6;
  bool ssl_enable = 7;
  string ca_file = 8;
  string tls_name = 9;
}

 message RedisDBConfig {
    string addr = 1;
    string password =2;
    google.protobuf.Duration read_timeout = 3;
    google.protobuf.Duration write_timeout = 4;
    int32 db =5;
    bool ssl_enable = 6;
}


message JwtConfig {
  string secret =1;
  int32 expire = 2;
}